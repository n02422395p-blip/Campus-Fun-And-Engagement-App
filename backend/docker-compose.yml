version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: nust_mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: nust-engagement
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nust_backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      MONGODB_URI: mongodb://admin:password@mongodb:27017/nust-engagement?authSource=admin
      JWT_SECRET: your_jwt_secret_key_here_change_in_production
      PORT: 5000
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./src:/app/src
    command: npm run dev

volumes:
  mongodb_data:
  mongodb_config:

networks:
  default:
    name: nust-network
